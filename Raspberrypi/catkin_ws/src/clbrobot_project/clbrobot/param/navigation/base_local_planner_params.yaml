TrajectoryPlannerROS:
  holonomic_robot: false
  y_vels: [0.0]

  max_vel_x: 0.35
  min_vel_x: -0.15

  max_vel_theta: 0.5
  min_in_place_vel_theta: 0.3

  acc_lim_x: 0.40
  acc_lim_y: 0.0
  acc_lim_theta: 0.80

  xy_goal_tolerance: 0.15
  yaw_goal_tolerance: 0.4
  latch_xy_goal_tolerance: true

  sim_time: 1.2
  sim_granularity: 0.05
  angular_sim_granularity: 0.05

  path_distance_bias: 24.0
  goal_distance_bias: 18.0
  occdist_scale: 0.08

  vx_samples: 10
  vtheta_samples: 20

  oscillation_reset_dist: 0.10
  escape_vel: -0.10

  dwa: true
  prune_plan: false