DWAPlannerROS:
  max_vel_trans: 0.18
  min_vel_trans: 0.08

  max_vel_x: 0.18
  min_vel_x: -0.05

  max_vel_y: 0.12
  min_vel_y: -0.12

  max_vel_theta: 0.25
  min_vel_theta: 0.12

  acc_lim_x: 0.40
  acc_lim_y: 0.40
  acc_lim_theta: 0.80
  acc_lim_trans: 0.40

  prune_plan: false

  xy_goal_tolerance: 0.15
  yaw_goal_tolerance: 0.15
  trans_stopped_vel: 0.01
  theta_stopped_vel: 0.05

  sim_time: 1.2
  sim_granularity: 0.05
  angular_sim_granularity: 0.05

  path_distance_bias: 24.0
  goal_distance_bias: 18.0
  occdist_scale: 0.08
  twirling_scale: 0.0

  stop_time_buffer: 0.3
  oscillation_reset_dist: 0.10
  oscillation_reset_angle: 0.2

  forward_point_distance: 0.0
  scaling_speed: 0.10
  max_scaling_factor: 0.15

  vx_samples: 10
  vy_samples: 8
  vth_samples: 20

  use_dwa: true
  restore_defaults: false
  holonomic_robot: true