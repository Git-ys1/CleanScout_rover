DWAPlannerROS:
  max_vel_trans: 0.18
  min_vel_trans: 0.01
  max_vel_x: 0.18
  min_vel_x: 0.02
  max_vel_y: 0.12
  min_vel_y: -0.12
  max_vel_theta: 0.35
  min_vel_theta: 0.10
  acc_lim_x: 0.8
  acc_lim_y: 0.8
  acc_lim_theta: 2.0
  acc_lim_trans: 0.8

  prune_plan: false

  xy_goal_tolerance: 0.15
  yaw_goal_tolerance: 0.15
  trans_stopped_vel: 0.01
  theta_stopped_vel: 0.05
  sim_time: 2.0
  sim_granularity: 0.1
  angular_sim_granularity: 0.1
  path_distance_bias: 32.0
  goal_distance_bias: 20.0
  occdist_scale: 0.05
  twirling_scale: 0.0
  stop_time_buffer: 0.5
  oscillation_reset_dist: 0.05
  oscillation_reset_angle: 0.2
  forward_point_distance: 0.0
  scaling_speed: 0.15
  max_scaling_factor: 0.2
  vx_samples: 15
  vy_samples: 10
  vth_samples: 30

  use_dwa: true
  restore_defaults: false
