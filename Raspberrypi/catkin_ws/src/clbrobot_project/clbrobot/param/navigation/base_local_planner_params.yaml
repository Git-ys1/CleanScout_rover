TrajectoryPlannerROS:
  holonomic_robot: false
  y_vels: [0.0]

  max_vel_x: 0.16
  min_vel_x: -0.04

  max_rotational_vel: 0.30
  min_in_place_rotational_vel: 0.10

  # Keep aliases for readability with older notes.
  max_vel_theta: 0.30
  min_in_place_vel_theta: 0.10

  acc_lim_x: 0.35
  acc_lim_y: 0.0
  acc_lim_theta: 0.60

  xy_goal_tolerance: 0.30
  yaw_goal_tolerance: 0.60
  latch_xy_goal_tolerance: true

  sim_time: 1.5
  sim_granularity: 0.05
  angular_sim_granularity: 0.05

  path_distance_bias: 0.8
  goal_distance_bias: 0.6
  occdist_scale: 0.02
  meter_scoring: false

  vx_samples: 12
  vtheta_samples: 24

  oscillation_reset_dist: 0.10
  escape_vel: -0.05
  escape_reset_dist: 0.10
  escape_reset_theta: 0.5

  dwa: true
  prune_plan: true
  heading_scoring: false
  heading_lookahead: 0.325
