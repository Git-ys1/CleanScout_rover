# move_base 主循环与插件选择参数，C-4.1.4 TEB 主导航链使用。

# 空闲时不关闭 costmap，避免下一次目标到来时重新初始化造成延迟。
shutdown_costmaps: false

# 局部控制频率与无有效控制指令的容忍时间，单位分别为 Hz 和 s。
# controller_frequency 应与 TEB 输出能力及底盘安全门频率共同考虑。
controller_frequency: 10.0
controller_patience: 3.0

# 全局路径重规划频率与规划失败容忍时间，单位分别为 Hz 和 s。
# 0.5 Hz 表示约每 2 秒刷新一次全局路径，局部动态避障由 TEB 负责。
planner_frequency: 0.5
planner_patience: 5.0

# 在规定时间内移动不足 oscillation_distance 时判为振荡，单位 s 和 m。
oscillation_timeout: 8.0
oscillation_distance: 0.08

# 清理代价地图时，机器人周围保留的保守距离，单位 m。
conservative_reset_dist: 0.3

# 全局规划器仍使用 GlobalPlanner；局部规划器切换为 TEB。
base_global_planner: global_planner/GlobalPlanner
base_local_planner: teb_local_planner/TebLocalPlannerROS

# 保留清图等标准恢复行为，但关闭自动原地旋转清障。
# 后半场没有实时感知时，旋转中的车体扫掠可能先碰到尚未进入前视区的障碍。
recovery_behavior_enabled: true
clearing_rotation_allowed: false
