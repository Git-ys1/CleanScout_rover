serial:
  port: /dev/ttyUSB0
  baudrate: 115200
  timeout_s: 0.2
driver:
  protocol: yh_pwm_text
  dry_run: true
  echo_commands: true
  wrap_multi_command: true
  yaw_joint: joint0
  lift_joint: joint1
  pitch_joint: joint3
  yaw_servo_index: 0
  lift_servo_index: 1
  pitch_servo_index: 3
  duration_ms: 200
  yaw_init: 0.0
  lift_init: -0.93
  pitch_init: 1.2
  yaw_pwm_neutral: 1500
  lift_pwm_neutral: 1912
  pitch_pwm_neutral: 884
  yaw_pwm_per_rad: 500
  lift_pwm_per_rad: 500
  pitch_pwm_per_rad: 500
  yaw_pwm_sign: 1
  lift_pwm_sign: 1
  pitch_pwm_sign: -1
  pwm_min: 500
  pwm_max: 2200
  reference_binary_enabled: false
  reference_hold_joints:
  - 0.0
  - -0.93
  - 1.6
  - 1.2
  - 0.0
  - 0.801
  hold_servo_pwms:
  - 1500
  - 1912
  - 1915
  - 884
  - 1500
  - 1500
  stop_servo_indices:
  - 3
  prepare_tracking_pose: true
  tracking_pose_pwms:
    0: 1500
    1: 1912
    2: 1915
    3: 884
    4: 1500
    5: 1500
  tracking_pose_duration_ms: 1500
  tracking_pose_settle_s: 4.0
  tracking_pose_stages:
  - pwms:
      1: 1912
      2: 1915
    duration_ms: 3000
    settle_s: 1.0
  - pwms:
      0: 1500
      3: 884
      4: 1500
      5: 1500
    duration_ms: 1500
    settle_s: 0.8
visual_servo:
  control_axes:
  - pitch
  base_joints:
  - 0.0
  - -0.93
  - 1.6
  - 1.2
  - 0.0
  - 0.801
  dead_zone_px: 30
  control_rate_hz: 10
  max_yaw_delta: 0.015
  max_lift_delta: 0.01
  max_pitch_delta: 0.01
  confirm_frames: 2
  lost_hold_frames: 5
  lost_stop_frames: 15
  yaw_init: 0.0
  lift_init: -0.93
  pitch_init: 1.2
  yaw_min: -0.5
  yaw_max: 0.5
  lift_min: -1.2
  lift_max: -0.65
  pitch_min: 0.9
  pitch_max: 1.5
  kp_yaw: 0.0008
  ki_yaw: 0.0
  kd_yaw: 0.0
  kp_lift: 0.0007
  ki_lift: 0.0
  kd_lift: 0.0
  kp_pitch: 0.0006
  ki_pitch: 0.0
  kd_pitch: 0.0
  invert_yaw: true
  invert_lift: true
  invert_pitch: true
target_selector:
  track_class: bottle
  conf: 0.25
  strategy: nearest_center
yolo:
  model_path: /home/orangepi/rk3588_ai/models/official_yolo11.rknn
  target: rk3588
  camera: '0'
  width: 640
  height: 480
  fps: 30.0
  fourcc: MJPG
  skip: 0
