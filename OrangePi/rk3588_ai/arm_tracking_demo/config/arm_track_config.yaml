serial:
  port: /dev/ttyS7
  baudrate: 115200
  timeout_s: 0.2

driver:
  # Default to the verified official STM32 mechanical-arm text protocol.
  # Command example: #000P1500T0200!#003P1500T0200!
  protocol: yh_pwm_text
  dry_run: true
  echo_commands: true

  # The first visual-servo prototype only uses the yaw and pitch axes.
  yaw_joint: joint0
  pitch_joint: joint3
  yaw_servo_index: 0
  pitch_servo_index: 3
  duration_ms: 200

  # Conservative angle-to-PWM mapping. Real values must be adjusted after
  # the lower controller is connected and single-joint tests are done.
  yaw_init: 0.0
  pitch_init: 1.2
  yaw_pwm_neutral: 1500
  pitch_pwm_neutral: 1500
  yaw_pwm_per_rad: 500
  pitch_pwm_per_rad: 500
  yaw_pwm_sign: 1
  pitch_pwm_sign: -1
  pwm_min: 900
  pwm_max: 2100

  # Optional ROS2-reference binary frame backend. Keep disabled until the
  # flashed lower firmware is confirmed to understand it.
  reference_binary_enabled: false
  reference_hold_joints: [0.0, -0.930, 1.6, 1.2, 0.0, 0.801]
  hold_servo_pwms: [1500, 1500, 1500, 1500, 1500, 1500]
  stop_servo_indices: [0, 1, 2, 3, 4, 5]

visual_servo:
  base_joints: [0.0, -0.930, 1.6, 1.2, 0.0, 0.801]
  dead_zone_px: 30
  control_rate_hz: 10
  max_yaw_delta: 0.015
  max_pitch_delta: 0.015
  confirm_frames: 2
  lost_hold_frames: 5
  lost_stop_frames: 15

  yaw_init: 0.0
  pitch_init: 1.2
  yaw_min: -0.5
  yaw_max: 0.5
  pitch_min: 0.9
  pitch_max: 1.5

  kp_yaw: 0.0008
  ki_yaw: 0.0
  kd_yaw: 0.0
  kp_pitch: 0.0008
  ki_pitch: 0.0
  kd_pitch: 0.0

  # Matches the reference ROS2 tracker: target right/down reduces yaw/pitch.
  invert_yaw: true
  invert_pitch: true

target_selector:
  track_class: person
  conf: 0.25
  strategy: nearest_center

yolo:
  model_path: /home/orangepi/rk3588_ai/models/official_yolo11.rknn
  target: rk3588
  camera: "0"
  width: 640
  height: 480
  fps: 30.0
  fourcc: MJPG
  skip: 0
